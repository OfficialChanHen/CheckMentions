name: Daily Trump-Shoutout Scan

# Daily scan ownership moved to a Claude scheduled routine
# (https://claude.ai/code/routines) — that surface produces the analyst brief
# alongside the scan and is visible in the Claude iOS app. This workflow stays
# wired for manual runs (workflow_dispatch) as a fallback, with no cron.
on:
  workflow_dispatch:        # manual fallback only

permissions:
  contents: write           # commit the daily report
  issues: write             # open the summary issue

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — proceed once per Pacific morning (or on manual dispatch)
        id: guard
        run: |
          HOUR=$(TZ=America/Los_Angeles date +%H)
          DATE=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          # Manual dispatch always proceeds. Scheduled runs proceed only after
          # 07:00 Pacific AND only if today's report hasn't been committed yet.
          # GitHub Actions cron is UTC-only and can be delayed by 30-60+ min;
          # an exact hour==07 guard silently drops those late firings, so we
          # use ">= 7" plus an idempotency check on the report file instead.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -lt 7 ]; then
            echo "Pacific hour is $HOUR (< 7) — skipping this trigger."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif [ -f "reports/$DATE.md" ]; then
            echo "reports/$DATE.md already exists — skipping (idempotent)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pacific hour is $HOUR and reports/$DATE.md missing — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install -r requirements.txt

      - name: Run scan
        if: steps.guard.outputs.proceed == 'true'
        id: scan
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python main.py

      - name: Commit report
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "report: ${{ steps.scan.outputs.date }} Trump-shoutout scan"
            git push
          fi

      - name: Open summary issue
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.scan.outputs.issue_title }}" \
            --body-file issue_body.md \
            --label "daily-scan" 2>/dev/null \
          || gh issue create \
            --title "${{ steps.scan.outputs.issue_title }}" \
            --body-file issue_body.md
