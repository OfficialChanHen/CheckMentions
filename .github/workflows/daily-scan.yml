name: Daily Trump-Shoutout Scan

# Actions owns the daily scan (API keys live in GH Secrets). Fires at 05:00
# America/Los_Angeles year-round via IANA-tz-aware cron (DST handled
# automatically by GH Actions, March 2026 feature). The 2.5-hour gap before
# the Claude routine at 14:30 UTC / 07:30 PDT absorbs Actions cron drift
# (routinely 30-90 min on heavily-used schedules) so the routine never races
# the scan. The routine sees the fresh report, skips its own scan, and writes
# the analyst brief -- visible on the Claude iOS app. If Actions fails
# entirely, the routine runs the scan itself in free-sources fallback mode.
on:
  schedule:
    - cron: "17 5 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:        # manual runs anytime

permissions:
  contents: write           # commit the daily report
  issues: write             # open the summary issue

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — proceed once per Pacific morning (or on manual dispatch)
        id: guard
        run: |
          HOUR=$(TZ=America/Los_Angeles date +%H)
          DATE=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          # Manual dispatch always proceeds. Scheduled cron is tz-aware (5 AM
          # Pacific), so the hour check just protects against off-hour manual
          # mis-fires; idempotency is enforced by checking the report file so
          # late-fired duplicates and re-runs both skip cleanly.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -lt 5 ]; then
            echo "Pacific hour is $HOUR (< 5) — skipping this trigger."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif [ -f "reports/$DATE.md" ]; then
            echo "reports/$DATE.md already exists — skipping (idempotent)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pacific hour is $HOUR and reports/$DATE.md missing — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install -r requirements.txt

      - name: Run scan
        if: steps.guard.outputs.proceed == 'true'
        id: scan
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python main.py

      - name: Commit report
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "report: ${{ steps.scan.outputs.date }} Trump-shoutout scan"
            git push
          fi

      - name: Open summary issue
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.scan.outputs.issue_title }}" \
            --body-file issue_body.md \
            --label "daily-scan" 2>/dev/null \
          || gh issue create \
            --title "${{ steps.scan.outputs.issue_title }}" \
            --body-file issue_body.md
